    <script>
        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            // 更新图标
            const sun = document.querySelector('.sun');
            const sunRays = document.querySelector('.sun-rays');
            const moon = document.querySelector('.moon');
            
            if (newTheme === 'light') {
                sun.style.display = 'none';
                sunRays.style.display = 'none';
                moon.style.display = 'block';
            } else {
                sun.style.display = 'block';
                sunRays.style.display = 'block';
                moon.style.display = 'none';
            }
        }

        // 初始化主题
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        // 初始化图标
        if (savedTheme === 'light') {
            document.querySelector('.sun').style.display = 'none';
            document.querySelector('.sun-rays').style.display = 'none';
            document.querySelector('.moon').style.display = 'block';
        }

        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });

        // 滚动显示动画
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.card').forEach((el, index) => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(30px)';
            el.style.transition = `all 0.6s ease ${index * 0.1}s`;
            observer.observe(el);
        });

        // 头像加载失败时的备用方案
        document.getElementById('avatar').onerror = function() {
            this.src = 'https://api.dicebear.com/7.x/avataaars/svg?seed=maoge';
